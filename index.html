
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dodge the Creeps</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: linear-gradient(135deg, #0d0d0d, #1a1a2e);
      color: #f5f5f5;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      text-align: center;
      padding: 2rem 1rem 1rem;
    }

    header h1 {
      font-size: 3rem;
      color: #00ffc8;
      text-shadow: 2px 2px 8px rgba(0, 255, 204, 0.4);
    }

    main {
      flex-grow: 1;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    button {
      padding: 1rem 2.5rem;
      font-size: 1.8rem;
      background-color: #00ffc8;
      color: #000;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 0 20px rgba(0, 255, 204, 0.4);
    }

    button:hover {
      background-color: #00dab1;
      transform: scale(1.05);
    }

    footer {
      text-align: center;
      padding: 1rem;
      font-size: 1rem;
      color: #aaa;
      background-color: #0f0f1a;
    }
  </style>
</head>
<body>
  <header>
    <h1>Dodge the Creeps</h1>
  </header>

  <main>
    <button onclick="openGame()">Play Game</button>
  </main>

  <footer>
    Made by HMS Student.
  </footer>

  <script>
    function openGame() {
      const gameWindow = window.open(
        'game.html',
        'DodgeCreepsGame',
        'width=480,height=720,resizable=no'
      );

      if (!gameWindow) {
        alert('Popup blocked! Please allow popups for this site.');
      }
    }
  </script>
</body>
</html>
